<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crown Journal Instagram Carousel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,800&family=Teko:wght@600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --orange: #f37a22;
        --paper: #f4f1e9;
        --white: #ffffff;
        --black: #050505;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1080px;
        height: 1350px;
        margin: 0;
        overflow: hidden;
        background: var(--black);
      }

      body {
        color: var(--paper);
        font-family: Inter, Arial, sans-serif;
      }

      .slide {
        position: relative;
        width: 1080px;
        height: 1350px;
        padding: 92px 82px 74px;
        display: grid;
        align-content: space-between;
        overflow: hidden;
        background: #050505;
      }

      .slide::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(5, 5, 5, 0.92), rgba(5, 5, 5, 0.42)),
          linear-gradient(0deg, rgba(5, 5, 5, 0.94), rgba(5, 5, 5, 0.1) 45%, rgba(5, 5, 5, 0.84)),
          url("../../../assets/crown-fitted-hero.png") center / cover no-repeat;
        filter: contrast(1.04) saturate(0.92);
      }

      .slide::after {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        width: 18px;
        height: 100%;
        background: var(--orange);
      }

      .content,
      .footer {
        position: relative;
        z-index: 1;
      }

      .kicker {
        margin: 0 0 38px;
        color: var(--orange);
        font-family: Teko, Impact, sans-serif;
        font-size: 54px;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 0.9;
        text-transform: uppercase;
      }

      .quote {
        margin: 0;
        max-width: 850px;
        color: var(--white);
        font-family: Teko, Impact, sans-serif;
        font-size: 146px;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 0.82;
        text-transform: uppercase;
      }

      .quote.serif {
        font-family: "Source Serif 4", Georgia, serif;
        font-size: 78px;
        font-weight: 800;
        line-height: 1.04;
        text-transform: none;
      }

      .footer {
        display: flex;
        justify-content: space-between;
        gap: 42px;
        align-items: end;
        border-top: 3px solid rgba(244, 241, 233, 0.28);
        padding-top: 28px;
        color: rgba(244, 241, 233, 0.82);
        font-family: Teko, Impact, sans-serif;
        font-size: 42px;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 0.9;
        text-transform: uppercase;
      }

      .footer span:last-child {
        color: var(--orange);
        text-align: right;
      }
    </style>
  </head>
  <body>
    <main class="slide">
      <section class="content">
        <p class="kicker" id="kicker"></p>
        <p class="quote" id="quote"></p>
      </section>
      <footer class="footer">
        <span>The Crown Journal<br>by Kali Artistry</span>
        <span id="count"></span>
      </footer>
    </main>
    <script>
      var slides = [
        ["Vol. 001", "Heavy is the crown, but he wore it like a fitted.", true],
        ["New York", "New York did not know everything. New York knew enough.", true],
        ["Pressure", "The clutch is character.", false],
        ["City language", "People outside the city call it panic. New Yorkers call it accountability.", true],
        ["The smoke", "They wanted the lights. He wanted the smoke.", false],
        ["Lineage", "The city loves fighters first. Winning just gives the fight a parade.", true],
        ["Melo", "Skipping Melo would be ducking smoke.", false],
        ["The Finals", "Game 4 was the crown. Game 5 was the receipt.", false],
        ["Read", "The ring was the receipt. The pressure was the crown.", false]
      ];
      var params = new URLSearchParams(window.location.search);
      var index = Math.max(0, Math.min(slides.length - 1, parseInt(params.get("slide") || "1", 10) - 1));
      var slide = slides[index];
      document.getElementById("kicker").textContent = slide[0];
      var quote = document.getElementById("quote");
      quote.textContent = slide[1];
      if (slide[2]) {
        quote.classList.add("serif");
      }
      document.getElementById("count").textContent = String(index + 1).padStart(2, "0") + " / " + String(slides.length).padStart(2, "0");
    </script>
  </body>
</html>
